# Experiment F: Enriched descriptions + bug fixes
# Fixed: conv_s0/conv_s1 gradient flow, freeze DETR to prevent degradation
# =============================================================================

model:
  qwen_model: "Qwen/Qwen2.5-VL-3B-Instruct"
  qwen_dtype: "bfloat16"
  gradient_checkpointing: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]
  projector_hidden_dim: 1024
  sam3_checkpoint: null
  freeze_decoder_layers: true
  sam3_lr_scale: 1.0
  image_size: 1008

hires:
  enabled: false
  thin_dim: 32

tracker:
  v2_checkpoint: "checkpoints/v2_no_lm/best.pt"
  num_points_per_texture: 4
  coord_head_dim: 256
  freeze_detr: true     # DETR already strong (0.834 mIoU), don't degrade it
  detr_lr_scale: 0.1    # (irrelevant when frozen, kept for reference)
  tracker_lr_scale: 1.0
  use_point_projector: false  # KEY: Disabled
  aggregate_proj_tokens: false
  align_embedder: "sentence"        # "qwen" or "sentence"
  align_embed_dim: 768              # MPNet output dim; 0 = no projection
  align_model_name: "all-mpnet-base-v2"

data:
  data_root: "/home/aviad/RWTD"
  metadata_file: "metadata_phase1.json"
  train_size: 10
  val_size: 20
  num_workers: 2
  pin_memory: true
  system_prompt: "You are a texture boundary segmentation assistant. Describe each texture using its material, pattern structure, and size or shape features. Focus on what makes each texture visually different from the other. Mark textures with <SEG_A> and <SEG_B> tokens, then provide representative point coordinates for each texture region."
  user_prompt: "Identify the two textures in this image. For each, describe its material, pattern, and distinctive visual features in 5-10 words, then segment them."

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_epochs: 200
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_epochs: 3
  min_lr: 1.0e-6
  max_grad_norm: 1.0
  seg_grad_to_lm: false

loss:
  detr_weight: 0.0        # DETR frozen, loss would flow nowhere
  focal_weight: 5.0
  dice_weight: 1.0
  cls_weight: 2.0
  box_l1_weight: 5.0
  box_giou_weight: 2.0
  exclusivity_weight: 0.5
  tracker_weight: 1.0
  tracker_focal_weight: 5.0
  tracker_dice_weight: 1.0
  tracker_exclusivity_weight: 0.5
  reconstruction_weight: 0.0
  alignment_weight: 1.0
  alignment_temperature: 0.07
  lm_weight: 0.0

amp:
  enabled: true
  dtype: "bfloat16"

checkpoint:
  dir: "checkpoints/tracker_no_lm"
  save_every_n_epochs: 10
  keep_last_n: 3

logging:
  log_every_n_steps: 5
  use_wandb: false
  wandb_project: "qwen2sam-v2-tracker"
  wandb_run_name: "exp-h-lm-loss"

validation:
  every_n_epochs: 1

seed: 42
