amp:
  dtype: bfloat16
  enabled: true
checkpoint:
  dir: checkpoints/smoke_test_enriched
  keep_last_n: 3
  save_every_n_epochs: 2
data:
  data_root: /home/aviad/RWTD
  metadata_file: metadata_phase1.json
  num_workers: 2
  pin_memory: true
  system_prompt: You are a texture boundary segmentation assistant. When you identify
    a texture transition, describe each texture and mark it with <SEG_A> and <SEG_B>
    tokens, then provide representative point coordinates for each texture region.
  train_size: 10
  user_prompt: Describe and segment the texture transition in this image.
  val_size: 20
hires:
  enabled: false
  thin_dim: 32
logging:
  log_every_n_steps: 1
  use_wandb: false
  wandb_project: qwen2sam-v2-tracker
  wandb_run_name: exp-e-no-projector
loss:
  alignment_temperature: 0.07
  alignment_weight: 1.0
  box_giou_weight: 2.0
  box_l1_weight: 5.0
  cls_weight: 2.0
  detr_weight: 0.5
  dice_weight: 1.0
  exclusivity_weight: 0.5
  focal_weight: 5.0
  lm_weight: 0.0
  reconstruction_weight: 0.0
  tracker_dice_weight: 1.0
  tracker_exclusivity_weight: 0.5
  tracker_focal_weight: 5.0
  tracker_weight: 1.0
model:
  freeze_decoder_layers: true
  gradient_checkpointing: true
  image_size: 1008
  lora_alpha: 32
  lora_dropout: 0.0
  lora_r: 16
  lora_target_modules:
  - q_proj
  - v_proj
  projector_hidden_dim: 1024
  qwen_dtype: bfloat16
  qwen_model: Qwen/Qwen2.5-VL-3B-Instruct
  sam3_checkpoint: null
  sam3_lr_scale: 1.0
seed: 42
tracker:
  aggregate_proj_tokens: false
  align_embed_dim: 768
  align_embedder: sentence
  align_model_name: all-mpnet-base-v2
  coord_head_dim: 256
  detr_lr_scale: 0.1
  freeze_detr: false
  num_points_per_texture: 4
  tracker_lr_scale: 1.0
  use_point_projector: false
  v2_checkpoint: checkpoints/v2/best.pt
training:
  batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-05
  max_grad_norm: 1.0
  min_lr: 1.0e-06
  num_epochs: 2
  seg_grad_to_lm: false
  warmup_epochs: 3
  weight_decay: 0.01
validation:
  every_n_epochs: 2
